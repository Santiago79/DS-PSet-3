services:
  db:
    image: postgres:15
    container_name: opscenter_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: opscenter
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: opscenter_api
    restart: on-failure
    ports:
      - "3000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/opscenter
      PYTHONPATH: /app:/app/backend
    volumes:
      - ./backend:/app/backend

  ui:
    build:
      context: ./frontend
    container_name: opscenter_ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: